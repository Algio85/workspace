name: Publish Tokens to npm

on:
  push:
    branches:
      - main
    paths:
      - 'packages/tao/tokens/**'
      - 'packages/tao/scripts/**'
      - 'packages/tao/style-dictionary/**'
      - 'packages/tao/package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install
        working-directory: packages/tao

      - name: Build tokens
        run: npm run generate-shades && npm run build-tokens
        working-directory: packages/tao

      - name: Publish to npm
        run: npm publish --access public
        working-directory: packages/tao
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
